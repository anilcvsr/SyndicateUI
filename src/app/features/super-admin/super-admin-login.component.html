<div class="login-page">
  <div class="login-card card">
    <div class="brand">
      <img class="brand-logo" src="syndicate-logo.png" alt="Syndicate logo" />
      <h1 class="brand-title">Syndicate Platform</h1>
      <p class="brand-subtitle muted">Super Admin Portal</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="stack">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input id="email" class="input" type="email" autocomplete="username" formControlName="email" placeholder="superadmin@syndicate.local" />
        @if (form.controls.email.touched && form.controls.email.errors) {
          <span class="field-error">Enter a valid email.</span>
        }
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input id="password" class="input" type="password" autocomplete="current-password" formControlName="password" />
        @if (form.controls.password.touched && form.controls.password.errors) {
          <span class="field-error">Password must be at least 8 characters.</span>
        }
      </div>
      @if (error()) { <div class="toast toast-error" role="alert">{{ error() }}</div> }
      <button class="btn btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
